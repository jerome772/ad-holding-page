<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ADV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  :root {
    --navy: #1E2A3A;
    --terracotta: #C0502F;
    --sand: #E8E0D0;
    --cream: #F7F4EE;
    --charcoal: #3A3229;
    --ochre: #B98A44;
    --sage: #6B7052;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: var(--sand);
    overflow: hidden;
  }
  body {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Archivo', sans-serif;
  }

  /* soft ambient light that drifts toward the cursor, drawn behind everything */
  .glow {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0;
    background: radial-gradient(560px circle at var(--gx, 50%) var(--gy, 42%),
      rgba(192, 80, 47, 0.16),
      rgba(107, 112, 82, 0.06) 45%,
      rgba(232, 224, 208, 0) 70%);
  }

  .stage {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
    perspective: 900px;
  }

  .mark-row {
    display: flex;
    align-items: center;
    gap: 30px;
  }

  .mark-wrap {
    width: 108px;
    height: 92px;
    flex-shrink: 0;
    transform-style: preserve-3d;
    will-change: transform;
  }

  .mark {
    width: 100%;
    height: 100%;
    overflow: visible;
  }
  .mark path {
    fill: none;
    stroke-width: 11;
    stroke-linecap: square;
    stroke-linejoin: miter;
  }
  .mark .light { stroke: var(--navy); }
  .mark .accent { stroke: var(--terracotta); }
  .mark .light.echo { stroke: var(--navy); opacity: 0.14; }
  .mark .accent.echo { stroke: var(--terracotta); opacity: 0.18; }

  .wordmark {
    position: relative;
    display: flex;
    gap: 4px;
    overflow: hidden;
    perspective: 700px;
  }

  .word {
    display: flex;
    overflow: hidden;
  }
  .word span {
    font-family: 'Archivo Black', sans-serif;
    font-weight: 400;
    font-size: 132px;
    color: var(--navy);
    letter-spacing: -0.01em;
    line-height: 1;
    display: inline-block;
    transform: translateY(115%);
  }


  .rule {
    height: 3px;
    width: 0;
    background: var(--navy);
    position: relative;
  }
  .rule-dot {
    position: absolute;
    right: 0;
    top: -3.5px;
    width: 10px;
    height: 10px;
    background: var(--terracotta);
    opacity: 0;
    transform: scale(0);
  }

  .contact {
    font-family: 'Archivo', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--charcoal);
    opacity: 0;
    text-align: center;
    letter-spacing: -0.005em;
  }
  .contact a { color: var(--ochre); text-decoration: none; }

  .address {
    font-family: 'Archivo', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--charcoal);
    opacity: 0;
    text-align: center;
    letter-spacing: -0.005em;
  }

  @media (max-width: 640px) {
    .word span { font-size: 72px; }
    .mark-wrap { width: 64px; height: 54px; }
    .mark path { stroke-width: 9; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<div class="glow" id="glow"></div>

<div class="stage">
  <div class="mark-row">
    <div class="mark-wrap" id="markWrap">
      <svg class="mark" viewBox="0 0 104 88" xmlns="http://www.w3.org/2000/svg">
        <path class="light echo" id="e1" d="M 16.5 11 L 38.5 33 L 16.5 55" />
        <path class="accent echo" id="e2" d="M 32.5 11 L 54.5 33 L 32.5 55" />
        <path class="light" id="p1" d="M 16.5 11 L 38.5 33 L 16.5 55" />
        <path class="accent" id="p2" d="M 32.5 11 L 54.5 33 L 32.5 55" />
      </svg>
    </div>
    <div class="wordmark">
      <div class="word"><span>A</span></div>
      <div class="word"><span>D</span></div>
      <div class="word"><span>V</span></div>
    </div>
  </div>
  <div class="rule"><span class="rule-dot"></span></div>
  <div class="contact"><a href="mailto:hello@advhq.com.au">hello@advhq.com.au</a></div>
  <div class="address">350 George St, Sydney NSW, 2000</div>
</div>

<script>
  /* ---- logo + type reveal timeline ---- */
  ['p1', 'p2', 'e1', 'e2'].forEach(id => {
    const p = document.getElementById(id);
    const len = p.getTotalLength();
    p.style.strokeDasharray = len;
    p.style.strokeDashoffset = len;
  });

  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  gsap.set('.mark-wrap', { rotateY: -35, rotateX: 10, scale: 0.85, opacity: 0, filter: 'blur(8px)' });
  gsap.set('.word span', {
    opacity: 0, y: '-140%', scale: 0.7, transformOrigin: '50% 50%'
  });
  gsap.set('.rule-dot', { opacity: 0, scale: 0 });

  if (reduceMotion) {
    gsap.set(['.mark-wrap', '.word span', '.contact', '.address', '.rule-dot'],
      { opacity: 1, filter: 'blur(0px)', x: 0, y: 0, scale: 1, rotateX: 0, rotateY: 0 });
    gsap.set('.rule', { width: 460 });
    gsap.set('.glow', { opacity: 0.5 });
    ['p1', 'p2', 'e1', 'e2'].forEach(id => { document.getElementById(id).style.strokeDashoffset = 0; });
  } else {
    const tl = gsap.timeline({ defaults: { ease: 'power2.out' } });

    tl.to('.glow', { opacity: 0.85, duration: 1.3, ease: 'power2.out' }, 0)
      .to('.mark-wrap', { opacity: 1, rotateY: 0, rotateX: 0, scale: 1, filter: 'blur(0px)', duration: 1, ease: 'back.out(1.4)' }, 0)
      .to('#p1', { strokeDashoffset: 0, duration: 0.8, ease: 'power3.inOut' }, 0.15)
      .to('#p2', { strokeDashoffset: 0, duration: 0.8, ease: 'power3.inOut' }, 0.45)
      .to(['#e1', '#e2'], { strokeDashoffset: 0, duration: 1.2, ease: 'power2.inOut' }, 0.3)
      .to('.word span', {
        opacity: 1, y: '0%', scale: 1,
        duration: 1, stagger: 0.13, ease: 'elastic.out(1, 0.55)'
      }, 0.7)
      .to('.rule', { width: 460, duration: 0.6, ease: 'power2.inOut' }, 1.8)
      .to('.rule-dot', { opacity: 1, scale: 1, duration: 0.45, ease: 'back.out(3)' }, 2.3)
      .to('.contact', { opacity: 1, duration: 0.6 }, 1.95)
      .to('.address', { opacity: 0.7, duration: 0.6 }, 2.15);
  }

  /* ambient glow drifts toward the cursor; mark tilts in parallax with it */
  if (!reduceMotion) {
    const glow = document.getElementById('glow');
    let mouse = null;
    let glowPos = null;

    document.addEventListener('mousemove', (e) => {
      mouse = { x: e.clientX, y: e.clientY };
      if (!glowPos) glowPos = { ...mouse };

      const relX = (e.clientX / window.innerWidth - 0.5) * 2;
      const relY = (e.clientY / window.innerHeight - 0.5) * 2;
      gsap.to('.mark-wrap', {
        rotateY: relX * 14,
        rotateX: -relY * 10,
        duration: 0.6,
        ease: 'power2.out',
        overwrite: 'auto'
      });
    });

    function tickGlow() {
      if (mouse && glowPos) {
        glowPos.x += (mouse.x - glowPos.x) * 0.07;
        glowPos.y += (mouse.y - glowPos.y) * 0.07;
        glow.style.setProperty('--gx', glowPos.x + 'px');
        glow.style.setProperty('--gy', glowPos.y + 'px');
      }
      requestAnimationFrame(tickGlow);
    }
    requestAnimationFrame(tickGlow);
  }
</script>

</body>
</html>
